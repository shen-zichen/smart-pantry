spring:
  datasource:
    url: jdbc:h2:mem:smartpantry
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  h2:
    console:
      enabled: true

server:
  port: 8080

smartpantry:
  strategy:
    max-recipes: 7
    zero-waste-expiration-days: 3